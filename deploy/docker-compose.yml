# 服务器部署：面板 + Watchtower 自动更新
# MySQL 不在本 compose 内——面板连接你自有的 MySQL 实例（DB_* 环境变量）。
# 首次切换 v2：把 v1 的 data/ 目录只读挂载进来并设 V1_DATA_DIR，库为空时启动自动一次性导入。
# 用法：mkdir -p ~/relay-monitor && cp docker-compose.yml ~/relay-monitor/ && cd ~/relay-monitor && docker compose up -d
services:
  relay-monitor:
    image: ghcr.io/lettimepassby/relay-monitor:latest
    container_name: relay-monitor
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      # 「今日消耗 / 用量统计」的日期边界按此时区计算
      - TZ=Asia/Shanghai
      # ---- MySQL（外部实例，必填）----
      - DB_HOST=change-me
      - DB_PORT=3306
      - DB_USER=relay
      - DB_PASSWORD=change-me
      - DB_NAME=relay_monitor
      # ---- v1 数据一次性迁移（可选）：导入完成后可删除这两行 ----
      - V1_DATA_DIR=/app/v1-data
    volumes:
      - ./data:/app/v1-data:ro

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # GHCR 私有镜像：把 docker login 的凭证挂给 watchtower
      #（用 sudo docker login 登录的话凭证在 /root/.docker/config.json）
      - /root/.docker/config.json:/config.json:ro
    environment:
      # 新版 Docker 守护进程要求 API >= 1.40，watchtower 默认协商值过老
      - DOCKER_API_VERSION=1.44
    # 每分钟检查一次 relay-monitor 的新镜像，更新后清理旧镜像
    command: --cleanup --interval 60 relay-monitor
